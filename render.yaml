services:
  - type: web
    name: hostel-management-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_RUN_HOST
        value: "0.0.0.0"
      - key: FLASK_RUN_PORT
        value: "10000"
      - key: AUTO_CREATE_TABLES
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-management-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true

databases:
  - name: hostel-management-db
    databaseName: hostel_management
    user: hostel_management_user
