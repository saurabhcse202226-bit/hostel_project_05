{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:520px; margin-top:50px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="mb-1">Staff Signup</h3>
      <p class="text-muted mb-3">Create account for caretaker, warden, principal, or admin.</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" name="role" required>
            <option value="">Select role</option>
            <option value="caretaker">Caretaker</option>
            <option value="warden">Warden</option>
            <option value="principal">Principal</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" name="confirm_password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>

      <div class="mt-3 text-center">
        <a href="{{ url_for('auth.home') }}">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
