{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-grid-3x3-gap"></i> Room Visual — Select Floor</h1>
</div>

<div class="card">
  <p style="color: var(--muted); margin-bottom: 20px;">Click on a floor to view rooms and occupancy status.</p>
  
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;">
    {% if floors %}
      {% for floor in floors %}
        <a href="{{ url_for('rooms_visual', floor_no=floor) }}" style="text-decoration:none;">
          <div style="padding:28px;border:2px solid var(--border);border-radius:12px;background:var(--surface);text-align:center;cursor:pointer;transition:all .2s ease;hover:transform:translateY(-2px);hover:border-color:var(--accent);">
            <i class="bi bi-building" style="font-size:32px;color:var(--accent);margin-bottom:10px;display:block;"></i>
            <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--text);">Floor {{ floor }}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:8px;">View Rooms</div>
          </div>
        </a>
      {% endfor %}
    {% else %}
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);">
        <i class="bi bi-inbox" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px;"></i>
        No floors available. Add rooms first.
      </div>
    {% endif %}
  </div>
</div>

<style>
  a:hover div { border-color: var(--accent) !important; box-shadow: 0 4px 12px rgba(59,130,246,0.1); }
</style>
{% endblock %}
