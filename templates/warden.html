{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1>Warden Dashboard</h1></div>
<div class="card">
  <div class="card-hd">
    <div class="card-title"><i class="bi bi-people" style="color:var(--accent);margin-right:6px;"></i>Students</div>
    <input type="text" class="form-control form-control-sm" style="width:200px;" placeholder="Filter..." data-table-filter="wardenTable">
  </div>
  <div class="table-wrap">
    <table id="wardenTable">
      <thead><tr><th>Name</th><th>Reg No</th><th>Room</th><th>Year</th><th>Actions</th></tr></thead>
      <tbody>
        {% for s in data %}
        <tr>
          <td><strong>{{ s[1] }}</strong></td>
          <td>{{ s[2] }}</td>
          <td>{{ s[5] }}</td>
          <td>{{ s[4] }}</td>
          <td>
            <div class="d-flex gap-8">
              <a href="/edit/{{ s[0] }}" class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i></a>
              <a href="/delete/{{ s[0] }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Move to trash?')"><i class="bi bi-trash3"></i></a>
            </div>
          </td>
        </tr>
        {% else %}<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:24px;">No students found.</td></tr>{% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
