{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1>Test Notifications</h1></div>
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-warning"><i class="bi bi-exclamation-triangle-fill"></i>{{ messages[0] }}</div>{% endif %}{% endwith %}
{% if result %}<div class="alert alert-info" style="white-space:pre-wrap;">{{ result }}</div>{% endif %}
<div class="card">
  <div class="card-hd"><div class="card-title"><i class="bi bi-bell" style="color:var(--accent);margin-right:6px;"></i>Send Test Notification</div></div>
  <form method="POST">
    <div class="g2">
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" name="email" type="email" placeholder="test@example.com"></div>
      <div class="form-group"><label class="form-label">SMS Mobile</label><input class="form-control" name="mobile" placeholder="10-digit number"></div>
      <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Message</label><textarea class="form-control" name="message" rows="3" placeholder="Test message..."></textarea></div>
    </div>
    <button class="btn btn-primary"><i class="bi bi-send"></i> Send Test</button>
  </form>
</div>
{% endblock %}
